<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fat Loss Diet Plan Creator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">
        <header>
            <h1>Fat Loss Diet Plan Creator</h1>
            <p>Get a personalized 7-day Kerala diet plan for fat loss.</p>
        </header>

        <main>
            <section id="input-section" class="card">
                <h2>Tell us about yourself</h2>
                <form id="diet-form">
                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" required min="10" max="100" placeholder="e.g., 25">
                    </div>

                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" required min="30" max="250" placeholder="e.g., 80">
                    </div>

                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" required min="100" max="250" placeholder="e.g., 175">
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="activity">Activity Level</label>
                        <select id="activity" required>
                            <option value="1.2">Sedentary (little or no exercise)</option>
                            <option value="1.375">Lightly active (light exercise 1-3 days/week)</option>
                            <option value="1.55">Moderately active (moderate exercise 3-5 days/week)</option>
                            <option value="1.725">Very active (hard exercise 6-7 days/week)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="preference">Food Preference</label>
                        <select id="preference" required>
                            <option value="non-veg">Non-Vegetarian</option>
                            <option value="veg">Vegetarian</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="goal">Goal Speed</label>
                        <select id="goal" required>
                            <option value="0.5">Steady (0.5 kg/week) - Recommended</option>
                            <option value="0.75">Faster (0.75 kg/week)</option>
                            <option value="1">Aggressive (1 kg/week)</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">Generate My Plan</button>
                </form>
            </section>

            <section id="result-section" class="card hidden">
                <div class="result-header">
                    <h2>Your 7-Day Plan</h2>
                    <button id="regenerate-btn" class="btn-secondary">Generate Again</button>
                </div>

                <div id="stats" class="stats-grid">
                    <!-- Stats will be injected here -->
                </div>

                <div id="diet-plan" class="diet-grid">
                    <!-- Diet plan will be injected here -->
                </div>

                <div id="grocery-list-container" class="grocery-box">
                    <h3>🛒 Weekly Grocery List</h3>
                    <p class="grocery-note">Estimated items for your 7-day plan.</p>
                    <ul id="grocery-list" class="grocery-items">
                        <!-- Grocery items will be injected here -->
                    </ul>
                </div>
            </section>
        </main>

        <footer>
            <p>Disclaimer: Consult a doctor before starting any strict diet.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
